# Run: docker-compose up -d

# Run replica:
# docker compose exec mongo1 mongosh --port 27017 --eval '
# rs.reconfig({
#   _id: "rs0",
#   members: [
#     { _id: 0, host: "mongo1:27017" },
#     { _id: 1, host: "mongo2:27018" },
#     { _id: 2, host: "mongo3:27019" }
#   ]
# }, { force: true })
# '

services:
  mongo1:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo1:/data/db
    environment:
      MONGO_INITDB_DATABASE: resilient_db
  mongo2:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27018"]
    ports:
      - "27018:27018"
    volumes:
      - ./data/mongo2:/data/db
    environment:
      MONGO_INITDB_DATABASE: resilient_db
  mongo3:
    image: mongo:7
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27019"]
    ports:
      - "27019:27019"
    volumes:
      - ./data/mongo3:/data/db
    environment:
      MONGO_INITDB_DATABASE: resilient_db
  redis:
    image: redis:7
    ports:
      - "6379:6379"